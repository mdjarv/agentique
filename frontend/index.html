<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="description" content="Manage parallel Claude Code sessions" />
    <meta name="theme-color" content="#1a1b26" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>Agentique</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        var s = JSON.parse(localStorage.getItem("agentique:ui") || "{}");
        var t = s && s.state && s.state.theme;
        if (t === "light" || (t === "system" && matchMedia("(prefers-color-scheme: light)").matches)) {
          document.documentElement.classList.replace("dark", "light");
        }
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
