<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24253a"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5e9eff"/>
      <stop offset="100%" stop-color="#c990f0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Lucide Cpu icon scaled to center of 512x512 (original 24x24 → 240x240 centered at 256,256) -->
  <g transform="translate(136,136) scale(10)" fill="none" stroke="url(#icon)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer rect -->
    <rect x="4" y="4" width="16" height="16" rx="2"/>
    <!-- inner rect -->
    <rect x="9" y="9" width="6" height="6" rx="1"/>
    <!-- top pins -->
    <path d="M9 2v2"/>
    <path d="M15 2v2"/>
    <!-- bottom pins -->
    <path d="M9 20v2"/>
    <path d="M15 20v2"/>
    <!-- left pins -->
    <path d="M2 9h2"/>
    <path d="M2 15h2"/>
    <!-- right pins -->
    <path d="M20 9h2"/>
    <path d="M20 15h2"/>
  </g>
</svg>
