name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ hashFiles('backend/**/*.go', 'backend/go.sum') }}
          restore-keys: go-build-

      - name: Cache frontend build
        id: frontend-cache
        uses: actions/cache@v4
        with:
          path: frontend/dist
          key: frontend-dist-${{ hashFiles('frontend/src/**', 'frontend/package-lock.json', 'frontend/vite.config.ts', 'frontend/tsconfig.json', 'frontend/index.html') }}

      - uses: actions/setup-node@v4
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        run: cd frontend && npm ci && npm run build

      - name: Embed frontend into backend
        run: |
          rm -rf backend/internal/server/frontend_dist
          mkdir -p backend/internal/server/frontend_dist
          cp -r frontend/dist/* backend/internal/server/frontend_dist/

      - name: Build binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"
          cd backend
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o "../dist/agentique-linux-amd64" ./cmd/agentique

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/agentique-linux-amd64
            dist/checksums.txt
